services:
  app_payglobal:
    build:
      context: backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    networks:
      - main_network
    environment:
      DB_URL: jdbc:postgresql://payglobal.vip/db_payglobal
      DB_USER_NAME: postgres
      DB_PASSWORD: P4ygl0b41+
      SENDGRID_API_KEY: 7b2b43ebb13be494f1f1ab9382f425a0
      TZ: Etc/GMT+6
    restart: always

  frontend:
    build:
      context: frontend/
      args:
        #VITE_API_BASE_URL: http://payglobal.vip/api
        VITE_API_BASE_URL: https://payglobal.vip:8080/api
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app_payglobal
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - main_network

networks:
  main_network:
    driver: bridge
